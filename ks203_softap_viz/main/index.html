<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KS203</title>
  <style>
    :root {
      --panel: #1a2332;
      --text: #e8eef7;
      --muted: #8b9bb4;
      --ok: #3ecf8e;
      --bad: #f07178;
      --mono: "Cascadia Mono", "Consolas", "Courier New", monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f1419;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(520px, 100%);
      background: var(--panel);
      border: 1px solid #2a3a50;
      border-radius: 16px;
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 1.1rem; }
    .sub { color: var(--muted); font-size: .85rem; margin-bottom: 20px; }
    .value {
      font-size: clamp(2.8rem, 11vw, 4rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .unit { font-size: 1.1rem; color: var(--muted); margin-left: 6px; }
    .cm { margin: 10px 0 20px; color: var(--muted); }
    .row { margin-bottom: 12px; }
    .label { color: var(--muted); font-size: .8rem; margin-bottom: 4px; }
    .hex {
      font-family: var(--mono);
      font-size: .95rem;
      word-break: break-all;
      background: #121821;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .status {
      display: flex;
      justify-content: space-between;
      margin-top: 18px;
      font-size: .85rem;
      color: var(--muted);
    }
    .pill {
      padding: 4px 10px;
      border-radius: 999px;
      background: #243247;
    }
    .pill.ok { color: var(--ok); }
    .pill.bad { color: var(--bad); }
  </style>
</head>
<body>
  <main class="card">
    <h1>KS203 Distance</h1>
    <div class="sub">mm = RX[0]&lt;&lt;8 | RX[1] (only when RX length is 2)</div>
    <div>
      <span id="mm" class="value">--</span><span class="unit">mm</span>
    </div>
    <div class="cm"><span id="cm">--</span> cm</div>
    <div class="row">
      <div class="label">TX</div>
      <div id="tx" class="hex">--</div>
    </div>
    <div class="row">
      <div class="label">RX</div>
      <div id="rx" class="hex">--</div>
    </div>
    <div class="status">
      <span id="state" class="pill">connecting...</span>
      <span id="ts">--:--:--</span>
    </div>
  </main>
  <script>
    const mmEl = document.getElementById("mm");
    const cmEl = document.getElementById("cm");
    const txEl = document.getElementById("tx");
    const rxEl = document.getElementById("rx");
    const stateEl = document.getElementById("state");
    const tsEl = document.getElementById("ts");

    async function tick() {
      try {
        const res = await fetch("/api/frame", { cache: "no-store" });
        const data = await res.json();
        tsEl.textContent = new Date().toLocaleTimeString();
        txEl.textContent = data.tx || "--";
        rxEl.textContent = data.rx || "--";
        if (data.has_mm) {
          mmEl.textContent = data.mm;
          cmEl.textContent = (data.mm / 10).toFixed(1);
          stateEl.textContent = data.mm + " mm";
          stateEl.className = "pill ok";
        } else {
          mmEl.textContent = "--";
          cmEl.textContent = "--";
          stateEl.textContent = data.ok ? ("RX " + data.rx_len + " bytes") : "no reply";
          stateEl.className = "pill bad";
        }
      } catch (e) {
        stateEl.textContent = "network error";
        stateEl.className = "pill bad";
      }
    }
    tick();
    setInterval(tick, 300);
  </script>
</body>
</html>
